server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: kal-backend

  # ---------- H2 file（开箱即用，同时避免重启/更新后丢失已注册账号） ----------
  datasource:
    url: ${H2_URL:jdbc:h2:file:./data/kal;MODE=MySQL;AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ---------- 真实 SMTP（默认走 163 邮箱发送验证码 / 私信通知） ----------
  # 上线请通过环境变量覆盖：KAL_SMTP_USER / KAL_SMTP_PASS（密码即「客户端授权码」，非网页登录密码）。
  mail:
    protocol: ${KAL_SMTP_PROTOCOL:smtps}
    host:     ${KAL_SMTP_HOST:smtp.163.com}
    port:     ${KAL_SMTP_PORT:465}
    username: ${KAL_SMTP_USER:}
    # 这里填的是 163 的「客户端授权码」（不是网页登录密码）
    password: ${KAL_SMTP_PASS:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${KAL_SMTP_SSL:true}
            trust: "*"
            checkserveridentity: false
          starttls:
            enable: ${KAL_SMTP_STARTTLS:false}
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
          quitwait: false
        smtps:
          auth: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
          quitwait: false
          ssl:
            trust: "*"
            checkserveridentity: false
          # 排查 SMTP 时取消下行注释，控制台可看到完整握手与协议交互
          # debug: true

# ---------- 应用自定义配置 ----------
kal:
  jwt:
    # 32+ 字符的密钥（HS256），可在生产环境通过 KAL_JWT_SECRET 环境变量覆盖
    secret: ${KAL_JWT_SECRET:please-change-this-jwt-secret-32bytes-min}
    expire-minutes: 480
  cors:
    allowed-origins: ${KAL_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://localhost:3000}
  web:
    base-url: ${KAL_WEB_BASE_URL:http://localhost:5173}
  mail:
    enabled: ${KAL_MAIL_ENABLED:true}
    from:    ${KAL_MAIL_FROM:KAL 知行创坊 <no-reply@example.com>}

logging:
  level:
    root: INFO
    cn.edu.ruc.kal: INFO
    org.hibernate.SQL: WARN

---

spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/kal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:kal}
    password: ${MYSQL_PASSWORD:change_me}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false
