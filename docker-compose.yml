services:
  mysql:
    # 境内访问 hub.docker.com 易超时：可在 .env 设 MYSQL_IMAGE，例如 DaoCloud 代理前缀：
    # MYSQL_IMAGE=docker.m.daocloud.io/library/mysql:8.4
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: kal-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kal
      MYSQL_USER: ${MYSQL_USER:-kal}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - kal-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: kal-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_URL: jdbc:mysql://mysql:3306/kal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: ${MYSQL_USER:-kal}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      JPA_DDL_AUTO: update
      KAL_JWT_SECRET: ${KAL_JWT_SECRET:?set KAL_JWT_SECRET in .env}
      KAL_CORS_ALLOWED_ORIGINS: ${KAL_CORS_ALLOWED_ORIGINS:-http://47.238.235.51:3000,http://localhost:3000,http://127.0.0.1:3000}
      KAL_WEB_BASE_URL: ${KAL_WEB_BASE_URL:-http://47.238.235.51:3000}
      KAL_MAIL_ENABLED: ${KAL_MAIL_ENABLED:-false}
      KAL_SMTP_HOST: ${KAL_SMTP_HOST:-smtp.163.com}
      KAL_SMTP_PORT: ${KAL_SMTP_PORT:-465}
      KAL_SMTP_USER: ${KAL_SMTP_USER:-}
      KAL_SMTP_PASS: ${KAL_SMTP_PASS:-}
      KAL_MAIL_FROM: ${KAL_MAIL_FROM:-KAL 知行创坊 <no-reply@example.com>}
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend-vue
      args:
        VITE_API_BASE: /api/v1
    container_name: kal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  kal-mysql-data:
